<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketWings — Indian Market Intelligence</title>
    <meta name="description" content="AI-powered stock and commodity analysis for NSE, BSE, and MCX. Real-time candlestick charts, technical indicators, and Gemini AI insights.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #0ea5e9;
        --accent-glow: rgba(14, 165, 233, 0.15);
        --green: #10b981;
        --red: #f43f5e;
        --gold: #f59e0b;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Outfit', sans-serif;
        background-color: #fdfdfd;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        background-size: 2rem 2rem;
        min-height: 100vh;
        color: #111827;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #fdfdfd; border-left: 2px solid #000; }
      ::-webkit-scrollbar-thumb { background: #000; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes ticker-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      .animate-slide-right { animation: slideInRight 0.4s ease-out forwards; }
      .animate-ticker { animation: ticker-scroll 40s linear infinite; }
      .animate-spin-slow { animation: spin-slow 8s linear infinite; }

      /* Neo-brutalist Utility Classes */
      .neo-card {
        background: #ffffff;
        border: 3px solid #000000;
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        border-radius: 0.5rem;
      }
      
      .neo-card-flat {
        background: #ffffff;
        border: 3px solid #000000;
        border-radius: 0.5rem;
      }

      .neo-btn {
        background: #ffffff;
        border: 3px solid #000000;
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        border-radius: 0.5rem;
        font-weight: 700;
        text-transform: uppercase;
        transition: all 0.1s ease;
      }
      
      .neo-btn:hover:not(:disabled) {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
      }
      
      .neo-btn:active:not(:disabled) {
        transform: translate(4px, 4px);
        box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
      }

      .neo-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Vibrant colors for neo theme */
      .bg-neo-pink { background-color: #ff90e8; }
      .bg-neo-green { background-color: #bbf7d0; }
      .bg-neo-lime { background-color: #ccff00; }
      .bg-neo-yellow { background-color: #fde047; }
      .bg-neo-orange { background-color: #fed7aa; }
      .bg-neo-blue { background-color: #bfdbfe; }
      .bg-neo-purple { background-color: #e9d5ff; }

      /* Number font */
      .font-mono-num {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Market status badge */
      .status-open { color: #10b981; }
      .status-closed { color: #f43f5e; }

      /* Ticker tape */
      .ticker-wrap {
        overflow: hidden;
        white-space: nowrap;
      }
      .ticker-inner {
        display: inline-flex;
        animation: ticker-scroll 60s linear infinite;
      }
      .ticker-inner:hover {
        animation-play-state: paused;
      }

      /* Chart container */
      .chart-container {
        position: relative;
        width: 100%;
        border-radius: 0.75rem;
        overflow: hidden;
      }

      /* Confidence ring */
      .confidence-ring {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /* Heatmap cell */
      .heatmap-cell {
        transition: all 0.2s ease;
        cursor: pointer;
      }
      .heatmap-cell:hover {
        transform: scale(1.05);
        z-index: 10;
      }

      /* Indicator badge */
      .indicator-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.05em;
      }

      /* Price up/down colours */
      .price-up { color: #10b981; }
      .price-down { color: #f43f5e; }

      /* Search dropdown */
      .search-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 50;
        margin-top: 4px;
        background: #0f172a;
        border: 1px solid rgba(51, 65, 85, 0.8);
        border-radius: 0.75rem;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }

      /* Watchlist sparkline placeholder */
      .sparkline-canvas { display: block; }

      /* Tab active */
      .tab-active {
        background: #000;
        color: #fff;
        border-color: #000;
      }

      /* RSI zones */
      .rsi-overbought { color: #dc2626; }
      .rsi-oversold { color: #16a34a; }
      .rsi-neutral { color: #6b7280; }

      /* Scrollable panel */
      .scroll-panel {
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #000 #fff;
      }

      /* Loading skeleton */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 4px;
      }

      /* Tooltip */
      .tooltip {
        position: relative;
      }
      .tooltip:hover::after {
        content: attr(data-tip);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: #e2e8f0;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.7rem;
        white-space: nowrap;
        border: 1px solid #334155;
        z-index: 100;
      }
    </style>

  "imports": {

  </head>

    <div id="root"></div>

  </body>
</html>
